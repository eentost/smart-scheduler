version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-scheduler-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - smart-scheduler-network
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: smart-scheduler-db
    environment:
      - POSTGRES_DB=smart_scheduler
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secure_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - smart-scheduler-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart-scheduler-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - smart-scheduler-network
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:

networks:
  smart-scheduler-network:
    driver: bridge
